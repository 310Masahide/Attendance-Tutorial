services:
  - type: web
    name: attendance-app
    env: docker
    plan: free
    repo: https://github.com/310Masahide/Attendance-Tutorial
    dockerfilePath: attendance_app/Dockerfile
    dockerContext: attendance_app
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
